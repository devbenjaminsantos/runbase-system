version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: olympus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: olympus_root
      MYSQL_DATABASE: olympus_admin
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -polympus_root --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql_data:
