<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings • Olympus Admin Inc.</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <aside
          class="col-lg-2 d-none d-lg-flex flex-column p-0 border-end min-vh-100 bg-body"
        >
          <div class="p-3 border-bottom">
            <div class="d-flex align-items-center gap-2">
              <div class="rounded-3 border p-2 fw-bold">AP</div>
              <div>
                <div class="fw-semibold" data-brand-name>
                  Olympus Admin Inc.
                </div>
                <div class="text-body-secondary small" data-brand-subtitle>
                  Control Center
                </div>
              </div>
            </div>
          </div>

          <nav class="p-2">
            <ul class="nav nav-pills flex-column gap-1">
              <li class="nav-item">
                <a class="nav-link" href="index.html">Dashboard</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="users.html"
                  >Users<span class="badge bg-secondary ms-1" id="usersCount"
                    >0</span
                  ></a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="orders.html"
                  >Orders<span class="badge bg-secondary ms-1" id="ordersCount"
                    >0</span
                  ></a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="settings.html">Settings</a>
              </li>
            </ul>
          </nav>

          <div class="mt-auto p-3 border-top small text-body-secondary">
            © <span id="year"></span>
            <span data-brand-name>Olympus Admin Inc.</span>
          </div>
        </aside>

        <main class="col-lg-10 p-0">
          <header class="border-bottom bg-body">
            <div
              class="d-flex align-items-center justify-content-between px-3 py-2 gap-2"
            >
              <div class="d-flex align-items-center gap-2">
                <button
                  class="btn btn-outline-secondary d-lg-none"
                  type="button"
                  data-bs-toggle="offcanvas"
                  data-bs-target="#sidebarMobile"
                  aria-controls="sidebarMobile"
                >
                  ☰
                </button>
                <div class="fw-semibold">Settings</div>
              </div>

              <div class="d-flex align-items-center gap-2">
                <button
                  id="themeToggle"
                  class="btn btn-outline-secondary"
                  type="button"
                  aria-label="Toggle theme"
                >
                  🌙
                </button>
              </div>
            </div>
          </header>

          <section class="p-3 p-md-4">
            <div class="card shadow-sm">
              <div class="card-body">
                <div id="settingsStatus" class="panel-status" aria-live="polite">
                  <div class="panel-status-copy">
                    <strong id="settingsStatusTitle">Loading settings</strong>
                    <span id="settingsStatusMessage"
                      >Fetching the current workspace configuration.</span
                    >
                  </div>
                  <button
                    id="settingsRetryBtn"
                    type="button"
                    class="btn btn-sm btn-outline-secondary d-none"
                  >
                    Retry
                  </button>
                </div>

                <form id="settingsForm" class="row g-3">
                  <div class="col-md-6">
                    <label for="companyName" class="form-label"
                      >Company name</label
                    >
                    <input
                      type="text"
                      class="form-control"
                      id="companyName"
                      placeholder="Olympus Admin Inc."
                    />
                  </div>

                  <div class="col-md-6">
                    <label for="supportEmail" class="form-label"
                      >Support email</label
                    >
                    <input
                      type="email"
                      class="form-control"
                      id="supportEmail"
                      placeholder="support@example.com"
                    />
                  </div>

                  <div class="col-md-6">
                    <label for="defaultRole" class="form-label"
                      >Default user role</label
                    >
                    <select id="defaultRole" class="form-select">
                      <option value="user">User</option>
                      <option value="manager">Manager</option>
                      <option value="admin">Admin</option>
                    </select>
                  </div>

                  <div class="col-md-6">
                    <label for="dashboardView" class="form-label"
                      >Default dashboard view</label
                    >
                    <select id="dashboardView" class="form-select">
                      <option value="overview">Overview</option>
                      <option value="analytics">Analytics</option>
                      <option value="reports">Reports</option>
                    </select>
                  </div>

                  <div class="col-12">
                    <div class="form-check form-switch">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        id="emailNotifications"
                      />
                      <label class="form-check-label" for="emailNotifications">
                        Enable email notifications
                      </label>
                    </div>
                  </div>

                  <div class="col-12">
                    <div class="form-check form-switch">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        id="weeklyReports"
                      />
                      <label class="form-check-label" for="weeklyReports">
                        Enable weekly reports
                      </label>
                    </div>
                  </div>

                  <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                      Save settings
                    </button>
                    <button
                      type="button"
                      class="btn btn-outline-danger"
                      id="resetSettings"
                    >
                      Reset settings
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <div
      class="offcanvas offcanvas-start"
      tabindex="-1"
      id="sidebarMobile"
      aria-labelledby="sidebarMobileLabel"
    >
      <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title" id="sidebarMobileLabel" data-brand-name>
          Olympus Admin Inc.
        </h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>
      <div class="offcanvas-body">
        <ul class="nav nav-pills flex-column gap-1">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="users.html">Users</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="orders.html">Orders</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="settings.html">Settings</a>
          </li>
        </ul>
      </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div
        id="settingsToast"
        class="toast"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="toast-header">
          <strong class="me-auto">Olympus Admin</strong>
          <small>Now</small>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="toast"
            aria-label="Close"
          ></button>
        </div>
        <div class="toast-body" id="settingsToastBody">Update completed.</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/settings.js"></script>
  </body>
</html>
