<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login • Olympus Admin</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body data-requires-auth="false" class="bg-body-tertiary">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
          <div class="text-center mb-4">
            <div class="d-inline-flex rounded-3 border bg-body px-3 py-2 fw-bold">
              OA
            </div>
            <h1 class="h3 mt-3 mb-2">Olympus Admin</h1>
            <p class="text-body-secondary mb-0">
              Entre com a conta administrativa para acessar o painel.
            </p>
          </div>

          <div class="card shadow-sm">
            <div class="card-body p-4">
              <form id="loginForm" novalidate>
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input
                    id="email"
                    type="email"
                    class="form-control"
                    value="admin@olympus.local"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="password" class="form-label">Password</label>
                  <input
                    id="password"
                    type="password"
                    class="form-control"
                    value="Admin123!"
                    required
                  />
                </div>

                <div
                  id="loginError"
                  class="alert alert-danger d-none"
                  role="alert"
                ></div>

                <button type="submit" class="btn btn-primary w-100">
                  Entrar no painel
                </button>
              </form>
            </div>
          </div>

          <p class="text-body-secondary small text-center mt-3 mb-0">
            Credenciais iniciais do ambiente local preenchidas automaticamente.
          </p>
        </div>
      </div>
    </main>

    <script src="assets/js/api.js"></script>
    <script>
      (function () {
        const api = window.OlympusAPI;
        const form = document.getElementById("loginForm");
        const errorBox = document.getElementById("loginError");

        if (!api || !form) return;

        if (api.getToken()) {
          window.location.href = "index.html";
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();

          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;

          errorBox.classList.add("d-none");
          errorBox.textContent = "";

          try {
            const result = await api.request("/auth/login", {
              method: "POST",
              body: JSON.stringify({ email, password }),
            });

            api.setSession(result.token, result.refreshToken, result.user);
            window.location.href = "index.html";
          } catch (error) {
            errorBox.textContent = error.message;
            errorBox.classList.remove("d-none");
          }
        });
      })();
    </script>
  </body>
</html>
